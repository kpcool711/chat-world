<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b8d4"/>
      <stop offset="55%" stop-color="#2979ff"/>
      <stop offset="100%" stop-color="#7c4dff"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#1de9b6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#1de9b6" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- rounded square background -->
  <rect width="512" height="512" rx="115" fill="url(#bg)"/>
  <ellipse cx="256" cy="215" rx="220" ry="200" fill="url(#glow)"/>
  <!-- globe -->
  <g transform="translate(256 240)">
    <circle r="132" fill="#ffffff" fill-opacity="0.14" stroke="#ffffff" stroke-width="9"/>
    <!-- equator -->
    <ellipse rx="132" ry="46" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.85"/>
    <!-- meridians -->
    <ellipse rx="46" ry="132" fill="none" stroke="#ffffff" stroke-width="6" stroke-opacity="0.85"/>
    <ellipse rx="95" ry="132" fill="none" stroke="#ffffff" stroke-width="5" stroke-opacity="0.55"/>
    <line x1="-132" y1="0" x2="132" y2="0" stroke="#ffffff" stroke-width="6" stroke-opacity="0.85"/>
  </g>
  <!-- chat bubble overlapping the globe -->
  <g transform="translate(330 300)">
    <path d="M0 30 a30 30 0 0 1 30 -30 h80 a30 30 0 0 1 30 30 v52 a30 30 0 0 1 -30 30 h-58 l-30 28 v-28 h-22 a30 30 0 0 1 -30 -30 z"
          fill="#ffffff"/>
    <circle cx="40" cy="56" r="9" fill="#2979ff"/>
    <circle cx="75" cy="56" r="9" fill="#7c4dff"/>
    <circle cx="110" cy="56" r="9" fill="#00b8d4"/>
  </g>
</svg>
