function showSearchModal() {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal search-modal">
      <h2>🔍 Search messages</h2>
      <p>Find old messages by typing words from them.</p>
      <input class="input" id="searchInput" placeholder="Type to search..." autocomplete="off" />
      <div class="search-results" id="searchResults">
        <div class="empty-state" style="padding: 20px;">
          <div class="sub">Start typing to search across all your chats</div>
        </div>
      </div>
      <div class="modal-row">
        <button class="btn" id="closeSearchBtn">Done</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.onclick = (e) => { if (e.target === bg) bg.remove(); };
  document.getElementById('closeSearchBtn').onclick = () => bg.remove();

  const input = document.getElementById('searchInput');
  const results = document.getElementById('searchResults');
  input.focus();

  // Cache messages so repeated searches don't refetch
  let cachedAll = null;
  let lastSearch = '';
  let searchDebounce = null;

  async function loadAllMessages() {
    if (cachedAll) return cachedAll;
    const all = [];
    for (const chat of state.chats) {
      try {
        const snap = await db.ref(`messages/${chat.id}`).once('value');
        if (!snap.exists()) continue;
        const msgs = snap.val();
        for (const id in msgs) {
          all.push({ chat, msg: msgs[id] });
        }
      } catch {}
    }
    cachedAll = all;
    return all;
  }

  async function doSearch(query) {
    if (!query || query.length < 2) {
      results.innerHTML = `<div class="empty-state" style="padding: 20px;"><div class="sub">Type at least 2 letters to search</div></div>`;
      return;
    }
    results.innerHTML = `<div class="empty-state" style="padding: 20px;"><div class="sub">Searching...</div></div>`;
    const all = await loadAllMessages();
    const q = query.toLowerCase();
    const matches = all
      .filter(({ msg }) => {
        const t = (msg.text || '').toLowerCase();
        return t.includes(q);
      })
      .sort((a, b) => b.msg.timestamp - a.msg.timestamp)
      .slice(0, 50);
    if (matches.length === 0) {
      results.innerHTML = `<div class="empty-state" style="padding: 20px;"><div class="big">🔎</div><div class="sub">No messages matched "${escapeHtml(query)}"</div></div>`;
      return;
    }
    const highlight = (text) => {
      const safe = escapeHtml(text);
      const re = new RegExp('(' + query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
      return safe.replace(re, '<mark>$1</mark>');
    };
    results.innerHTML = matches.map(({ chat, msg }) => {
      const chatName = chat.type === 'group' ? chat.name : (chat.participants.find(p => p !== state.me.username) || 'Unknown');
      const when = new Date(msg.timestamp).toLocaleDateString();
      const sender = msg.sender === state.me.username ? 'You' : msg.sender;
      return `
        <div class="search-result" data-chat-id="${chat.id}" data-msg-id="${msg.id}">
          <div class="search-result-chat">${escapeHtml(chatName)}</div>
          <div class="search-result-text">${sender}: ${highlight(msg.text)}</div>
          <div class="search-result-meta">${when}</div>
        </div>
      `;
    }).join('');
    results.querySelectorAll('.search-result').forEach(el => {
      el.onclick = () => {
        const chatId = el.dataset.chatId;
        const msgId = el.dataset.msgId;
        bg.remove();
        openChat(chatId).then(() => {
          // Give the messages listener a moment to populate, then scroll
          setTimeout(() => scrollToMessage(msgId), 600);
        });
      };
    });
  }

  input.addEventListener('input', () => {
    const q = input.value.trim();
    if (q === lastSearch) return;
    lastSearch = q;
    if (searchDebounce) clearTimeout(searchDebounce);
    searchDebounce = setTimeout(() => doSearch(q), 200);
  });
}

// ============ VOICE CALLS ============
// Free public STUN + TURN servers. TURN relays audio when peers can't connect
// directly (school WiFi, certain mobile networks, strict NATs). OpenRelay is
// a free public service — no signup or credit card needed.
const CALL_ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' },
  { urls: 'stun:stun.cloudflare.com:3478' },
  {
    urls: [
      'turn:openrelay.metered.ca:80',
      'turn:openrelay.metered.ca:443',
      'turn:openrelay.metered.ca:443?transport=tcp',
      'turns:openrelay.metered.ca:443',
    ],
    username: 'openrelayproject',
    credential: 'openrelayproject',
  },
];

// ---------- Remote audio element (persistent across UI re-renders) ----------
// Created once when a call starts. Lives at document.body so it survives any
// renderCallUI redraws (iOS Safari loses audio if we recreate the <audio> tag).
function ensureRemoteAudio() {
  let audio = document.getElementById('remoteAudio');
  if (!audio) {
    audio = document.createElement('audio');
    audio.id = 'remoteAudio';
    audio.autoplay = true;
    audio.setAttribute('playsinline', 'true');
    audio.controls = false;
    audio.style.display = 'none';
    document.body.appendChild(audio);
  }
  return audio;
}

function removeRemoteAudio() {
  const a = document.getElementById('remoteAudio');
  if (a) a.remove();
}

// iOS often blocks audio.play() if called outside a user gesture.
// If autoplay is blocked, wire up a one-time tap fallback to start it.
function tryPlayRemote(audio) {
  audio.play()
    .then(() => console.log('[call] remote audio playing'))
    .catch((err) => {
      console.warn('[call] autoplay blocked — waiting for tap', err);
      toast('Tap the call screen to hear audio');
      const onTap = () => {
        audio.play().catch(() => {});
        document.removeEventListener('click', onTap, true);
        document.removeEventListener('touchstart', onTap, true);
      };
      document.addEventListener('click', onTap, true);
      document.addEventListener('touchstart', onTap, true);
    });
}
// How long to ring before giving up (caller side)
const CALL_RING_TIMEOUT_MS = 35000;

let activeCall = null; // see initCallState() for shape
let callListeners = []; // [{chatId, ref, fn}]
let recentlyEndedCalls = {}; // {chatId: timestamp} — avoid re-showing the same ended call

function initCallState(opts) {
  return {
    chatId: opts.chatId,
    role: opts.role, // 'caller' | 'callee'
    otherUser: opts.otherUser,
    otherUserData: opts.otherUserData || null,
    pc: null,
    localStream: null,
    remoteStream: null,
    callRef: null,
    answerListener: null,
    callerCandidatesListener: null,
    calleeCandidatesListener: null,
    statusListener: null,
    startedAt: null,
    durationTimer: null,
    ringTimeout: null,
    ringtone: null,
    muted: false,
    cleanedUp: false,
  };
}

// Try to play a soft beep ringtone (Web Audio — works on most platforms, may be silent on iOS without prior user gesture)
function startRingtone() {
  try {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    const ctx = new AC();
    const beep = () => {
      try {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.frequency.value = 520;
        o.type = 'sine';
        o.connect(g);
        g.connect(ctx.destination);
        const t = ctx.currentTime;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18, t + 0.04);
        g.gain.setValueAtTime(0.18, t + 0.2);
        g.gain.linearRampToValueAtTime(0, t + 0.32);
        o.start(t);
        o.stop(t + 0.34);
      } catch {}
    };
    beep();
    const intv = setInterval(beep, 1100);
    return { stop: () => { clearInterval(intv); try { ctx.close(); } catch {} } };
  } catch {
    return null;
  }
}

function stopRingtone() {
  if (activeCall && activeCall.ringtone) {
    try { activeCall.ringtone.stop(); } catch {}
    activeCall.ringtone = null;
  }
}

function formatCallDuration(ms) {
  const s = Math.floor(ms / 1000);
  const m = Math.floor(s / 60);
  const ss = String(s % 60).padStart(2, '0');
  return `${m}:${ss}`;
}

// ---------- Call UI ----------
function showCallUI() {
  let overlay = document.getElementById('callOverlay');

    overlay = document.createElement('div');

function hideCallUI() {
  const overlay = document.getElementById('callOverlay');
  if (overlay) overlay.remove();
}

function renderCallUI() {
  const overlay = document.getElementById('callOverlay');
  if (!overlay || !activeCall) return;
  const u = activeCall.otherUserData || { username: activeCall.otherUser, avatar: '👤' };
  const avatarHtml = u.photo
    ? `<img src="${u.photo}" alt="" />`
    : (u.avatar || '👤');

  // Determine UI mode
  let mode = 'calling'; // caller, before answer
  if (activeCall.role === 'callee' && !activeCall.startedAt) mode = 'incoming';
  if (activeCall.startedAt) mode = 'in-call';

  overlay.className = `call-overlay ${mode === 'incoming' ? 'incoming' : (mode === 'in-call' ? 'in-call' : '')}`;

  let statusText, actionsHtml;
  if (mode === 'incoming') {

      <button class="call-action-btn answer" id="callAnswerBtn" title="Answer">📞</button>
    `;
  } else if (mode === 'calling') {
    statusText = 'Calling...';
    actionsHtml = `
      <button class="call-action-btn end" id="callEndBtn" title="End call">📞</button>
    `;
  } else {
    // in-call
    const elapsed = Date.now() - activeCall.startedAt;
    statusText = '';
    actionsHtml = `
      <button class="call-action-btn mute ${activeCall.muted ? 'muted' : ''}" id="callMuteBtn" title="${activeCall.muted ? 'Unmute' : 'Mute'}">${activeCall.muted ? '🔇' : '🎤'}</button>
      <button class="call-action-btn end" id="callEndBtn" title="End call">📞</button>
    `;
  }

  overlay.innerHTML = `
    <div class="call-avatar-big ${mode === 'incoming' ? 'pulse' : ''}">${avatarHtml}</div>
    <div class="call-name">${escapeHtml(u.username)}</div>
    ${statusText ? `<div class="call-status">${statusText}</div>` : ''}
    ${mode === 'in-call' ? `<div class="call-timer" id="callTimer">${formatCallDuration(Date.now() - activeCall.startedAt)}</div>` : ''}
    <div class="call-actions">${actionsHtml}</div>
  `;

  // Wire buttons
  const ans = document.getElementById('callAnswerBtn');
  const dec = document.getElementById('callDeclineBtn');
  const end = document.getElementById('callEndBtn');
  const mute = document.getElementById('callMuteBtn');
  if (ans) ans.onclick = () => answerIncomingCall();
  if (dec) dec.onclick = () => declineIncomingCall();
  if (end) end.onclick = () => endActiveCall();
  if (mute) mute.onclick = () => toggleMute();
}

function startCallDurationTimer() {
  if (!activeCall) return;
  if (activeCall.durationTimer) clearInterval(activeCall.durationTimer);
  activeCall.durationTimer = setInterval(() => {
    const el = document.getElementById('callTimer');
    if (el && activeCall && activeCall.startedAt) {
      el.textContent = formatCallDuration(Date.now() - activeCall.startedAt);
    }
  }, 1000);
}

// ---------- Outgoing call ----------
async function startVoiceCall() {
  if (activeCall) {
    toast('You already have a call in progress');
    return;
  }
  const chat = state.chats.find(c => c.id === state.currentChatId);
  if (!chat || chat.type !== 'direct') return;
  const other = chat.participants.find(p => p !== state.me.username);
  if (!other) return;

  // Check if a call already exists in this chat
  const existing = await db.ref(`calls/${state.currentChatId}`).once('value');
  const ec = existing.val();
  if (ec && (ec.status === 'ringing' || ec.status === 'active')) {
    const age = Date.now() - (ec.startedAt || 0);
    // Only treat as "in progress" if the existing call is recent (< 5 min).
    // Stuck/abandoned calls older than that get auto-cleaned.
    if (age < 5 * 60 * 1000) {
      toast('A call is already happening in this chat');
      return;
    }
    console.log('[call] removing stale call record (age:', Math.floor(age/1000), 's)');
    try { await db.ref(`calls/${state.currentChatId}`).remove(); } catch {}
  }

  activeCall = initCallState({
    chatId: state.currentChatId,
    role: 'caller',
    otherUser: other,
    otherUserData: getUser(other),
  });

  showCallUI();
  // Pre-warm the audio element while we still have user gesture context.
  // iOS will let us play() now, then later when ontrack fires the stream is
  // already attached to a "blessed" element so it actually plays.
  const preAudio = ensureRemoteAudio();
  preAudio.play().catch(() => {});

  // Get mic
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    console.log('[call] caller got mic, tracks:', stream.getAudioTracks().map(t => ({
      label: t.label, enabled: t.enabled, muted: t.muted,
    })));
  } catch (e) {
    toast('Microphone access is needed for calls');
    cleanupCall();
    return;
  }
  if (!activeCall) return; // user cancelled while waiting for permission
  activeCall.localStream = stream;

  // Set up peer connection
  const pc = new RTCPeerConnection({ iceServers: CALL_ICE_SERVERS });
  activeCall.pc = pc;
  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  // Remote stream
  activeCall.remoteStream = new MediaStream();
  pc.ontrack = (e) => {
    console.log('[call] caller received remote track', e.track && e.track.kind);
    let stream;
    if (e.streams && e.streams[0]) {
      stream = e.streams[0];
    } else {
      activeCall.remoteStream.addTrack(e.track);
      stream = activeCall.remoteStream;
    }
    activeCall.remoteStream = stream;
    const audio = ensureRemoteAudio();
    audio.srcObject = stream;
    tryPlayRemote(audio);
  };

  // Push ICE candidates to Firebase as they're generated
  const callRef = db.ref(`calls/${activeCall.chatId}`);
  activeCall.callRef = callRef;
  pc.onicecandidate = (e) => {
    if (!e.candidate || !activeCall) return;
    callRef.child('callerCandidates').push(e.candidate.toJSON()).catch(() => {});
  };

  // Connection state monitoring
  pc.onconnectionstatechange = () => {
    if (!activeCall) return;
    console.log('[call] caller connection:', pc.connectionState);
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      toast('Call connection lost');
      endActiveCall();
    }
  };
  pc.oniceconnectionstatechange = () => {
    if (activeCall) console.log('[call] caller ICE:', pc.iceConnectionState);
  };

  // Create offer
  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);

  // Write call record
  await callRef.set({
    caller: state.me.username,
    callerAvatar: state.me.avatar,
    callerPhoto: state.me.photo || null,
    callee: other,
    offer: { type: offer.type, sdp: offer.sdp },
    status: 'ringing',
    startedAt: Date.now(),
  });

  // Listen for answer
  activeCall.answerListener = callRef.child('answer').on('value', async (snap) => {
    if (!activeCall || activeCall.role !== 'caller') return;
    const answer = snap.val();
    if (answer && !pc.currentRemoteDescription) {
      try {
        await pc.setRemoteDescription(new RTCSessionDescription(answer));
        activeCall.startedAt = Date.now();
        await callRef.update({ status: 'active' });
        startCallDurationTimer();
        renderCallUI();
      } catch (err) {
        console.error('Error setting remote desc:', err);
      }
    }
  });

  // Listen for callee's ICE candidates
  activeCall.calleeCandidatesListener = callRef.child('calleeCandidates').on('child_added', async (snap) => {
    if (!activeCall || !activeCall.pc) return;
    try {
      await activeCall.pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    } catch {}
  });

  // Listen for status changes (decline / end)
  activeCall.statusListener = callRef.child('status').on('value', (snap) => {
    if (!activeCall) return;
    const s = snap.val();
    if (s === 'ended' || s === 'declined') {
      toast(s === 'declined' ? 'Call declined' : 'Call ended');
      cleanupCall();
    }
  });

  // Ring timeout
  activeCall.ringTimeout = setTimeout(() => {
    if (activeCall && !activeCall.startedAt) {
      toast('No answer');
      endActiveCall();
    }
  }, CALL_RING_TIMEOUT_MS);
}

// ---------- Incoming call ----------
async function showIncomingCall(chatId, call) {
  if (activeCall) {
    // Already in a call — auto-decline this new one
    await db.ref(`calls/${chatId}/status`).set('declined').catch(() => {});
    return;
  }
  activeCall = initCallState({
    chatId,
    role: 'callee',
    otherUser: call.caller,
    otherUserData: getUser(call.caller) || {
      username: call.caller,
      avatar: call.callerAvatar || '👤',
      photo: call.callerPhoto || null,
    },
  });
  activeCall.callRef = db.ref(`calls/${chatId}`);
  activeCall.pendingOffer = call.offer;

  // Start ringtone (may be silent on iOS without prior gesture)
  activeCall.ringtone = startRingtone();

  showCallUI();

  // Listen for caller-side cancel
  activeCall.statusListener = activeCall.callRef.child('status').on('value', (snap) => {
    if (!activeCall) return;
    const s = snap.val();
    if (s === 'ended' && !activeCall.startedAt) {
      // Caller cancelled before we answered
      toast('Caller hung up');
      cleanupCall();
    }
  });
}

async function answerIncomingCall() {
  if (!activeCall || activeCall.role !== 'callee') return;
  stopRingtone();

  // Pre-warm audio playback while we still have user gesture context.
  const preAudio = ensureRemoteAudio();
  preAudio.play().catch(() => {});

  // Get mic
  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
    console.log('[call] callee got mic, tracks:', stream.getAudioTracks().map(t => ({
      label: t.label, enabled: t.enabled, muted: t.muted,
    })));
  } catch (e) {
    toast('Microphone access is needed for calls');
    await activeCall.callRef.update({ status: 'declined' }).catch(() => {});
    cleanupCall();
    return;
  }
  if (!activeCall) return;
  activeCall.localStream = stream;

  // Set up peer connection
  const pc = new RTCPeerConnection({ iceServers: CALL_ICE_SERVERS });
  activeCall.pc = pc;
  stream.getTracks().forEach(t => pc.addTrack(t, stream));

  activeCall.remoteStream = new MediaStream();
  pc.ontrack = (e) => {
    console.log('[call] callee received remote track', e.track && e.track.kind);
    let stream;
    if (e.streams && e.streams[0]) {
      stream = e.streams[0];
    } else {
      activeCall.remoteStream.addTrack(e.track);
      stream = activeCall.remoteStream;
    }
    activeCall.remoteStream = stream;
    const audio = ensureRemoteAudio();
    audio.srcObject = stream;
    tryPlayRemote(audio);
  };

  pc.onicecandidate = (e) => {
    if (!e.candidate || !activeCall) return;
    activeCall.callRef.child('calleeCandidates').push(e.candidate.toJSON()).catch(() => {});
  };

  pc.onconnectionstatechange = () => {
    if (!activeCall) return;
    console.log('[call] callee connection:', pc.connectionState);
    if (pc.connectionState === 'failed' || pc.connectionState === 'disconnected') {
      toast('Call connection lost');
      endActiveCall();
    }
  };
  pc.oniceconnectionstatechange = () => {
    if (activeCall) console.log('[call] callee ICE:', pc.iceConnectionState);
  };

  // Set remote description from offer, then create answer
  await pc.setRemoteDescription(new RTCSessionDescription(activeCall.pendingOffer));
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);

  // Write answer
  await activeCall.callRef.child('answer').set({ type: answer.type, sdp: answer.sdp });

  // Listen for caller's ICE candidates
  activeCall.callerCandidatesListener = activeCall.callRef.child('callerCandidates').on('child_added', async (snap) => {
    if (!activeCall || !activeCall.pc) return;
    try {
      await activeCall.pc.addIceCandidate(new RTCIceCandidate(snap.val()));
    } catch {}
  });

  activeCall.startedAt = Date.now();
  startCallDurationTimer();
  renderCallUI();
}

async function declineIncomingCall() {
  if (!activeCall || activeCall.role !== 'callee') return;
  try { await activeCall.callRef.update({ status: 'declined' }); } catch {}
  cleanupCall();
}

// ---------- End/cleanup ----------
async function endActiveCall() {
  if (!activeCall) return;
  try {
    if (activeCall.callRef) {
      await activeCall.callRef.update({
        status: 'ended',
        endedAt: Date.now(),
      });
    }
  } catch {}
  cleanupCall();
}

function toggleMute() {
  if (!activeCall || !activeCall.localStream) return;
  activeCall.muted = !activeCall.muted;
  activeCall.localStream.getAudioTracks().forEach(t => { t.enabled = !activeCall.muted; });
  renderCallUI();
}

function cleanupCall() {
  if (!activeCall || activeCall.cleanedUp) {
    hideCallUI();
    activeCall = null;
    return;
  }
  activeCall.cleanedUp = true;
  const c = activeCall;

  // Remember this chat so we don't re-show the ended call
  if (c.chatId) recentlyEndedCalls[c.chatId] = Date.now();

  // Stop ringtone
  if (c.ringtone) { try { c.ringtone.stop(); } catch {} }

  // Stop timers
  if (c.durationTimer) clearInterval(c.durationTimer);
  if (c.ringTimeout) clearTimeout(c.ringTimeout);

  // Stop local stream
  if (c.localStream) c.localStream.getTracks().forEach(t => { try { t.stop(); } catch {} });

  // Close peer connection
  if (c.pc) { try { c.pc.close(); } catch {} }

  // Detach Firebase listeners
  if (c.callRef) {
    if (c.answerListener) c.callRef.child('answer').off('value', c.answerListener);
    if (c.statusListener) c.callRef.child('status').off('value', c.statusListener);
    if (c.callerCandidatesListener) c.callRef.child('callerCandidates').off('child_added', c.callerCandidatesListener);
    if (c.calleeCandidatesListener) c.callRef.child('calleeCandidates').off('child_added', c.calleeCandidatesListener);
  }

  // Caller cleans up the Firebase call record after a delay
  if (c.role === 'caller' && c.callRef) {
    setTimeout(() => { c.callRef.remove().catch(() => {}); }, 4000);
  }

  hideCallUI();
  removeRemoteAudio();
  activeCall = null;
}

// ---------- Incoming-call listeners (one per direct chat) ----------
function attachCallListeners() {
  // Detach existing
  detachCallListeners();
  // Listen on every direct chat
  for (const chat of state.chats) {
    if (chat.type !== 'direct') continue;
    const ref = db.ref(`calls/${chat.id}`);
    const fn = (snap) => {
      const call = snap.val();
      if (!call) return;
      handleCallEvent(chat.id, call);
    };
    ref.on('value', fn);
    callListeners.push({ chatId: chat.id, ref, fn });
  }
}

function detachCallListeners() {
  callListeners.forEach(l => l.ref.off('value', l.fn));
  callListeners = [];
}

function handleCallEvent(chatId, call) {
  if (!state.me || !call) return;

  // Skip stale calls (older than 60s, still ringing — means caller crashed)
  if (call.status === 'ringing' && call.startedAt && Date.now() - call.startedAt > 60000) {
    return;
  }
  // Skip ones we already handled
  if (recentlyEndedCalls[chatId] && Date.now() - recentlyEndedCalls[chatId] < 8000) {
    return;
  }

  // I'm being called!
  if (
    call.status === 'ringing' &&
    call.callee === state.me.username &&
    call.caller !== state.me.username &&
    (!activeCall || activeCall.chatId !== chatId)
  ) {
    showIncomingCall(chatId, call);
  }
}

// ============ CONFIRM DIALOG ============
function confirmDialog({ title, message, confirmText = 'Yes', cancelText = 'Cancel', danger = false }) {
  return new Promise((resolve) => {
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `
      <div class="modal">
        <h2>${escapeHtml(title)}</h2>
        <p>${escapeHtml(message)}</p>
        <div class="modal-row">
          <button class="btn btn-secondary" data-act="cancel">${escapeHtml(cancelText)}</button>
          <button class="btn ${danger ? 'btn-danger' : ''}" data-act="confirm">${escapeHtml(confirmText)}</button>
        </div>
      </div>
    `;
    document.body.appendChild(bg);
    const handle = (e) => {
      const act = e.target && e.target.dataset && e.target.dataset.act;
      if (e.target === bg || act === 'cancel') {
        bg.remove(); resolve(false);
      } else if (act === 'confirm') {
        bg.remove(); resolve(true);
      }
    };
    bg.addEventListener('click', handle);
  });
}

async function deleteMessage(chatId, messageId) {
  try {
    await db.ref(`messages/${chatId}/${messageId}`).remove();
    // Refresh chat's lastMessage preview based on remaining messages
    const snap = await db.ref(`messages/${chatId}`).orderByChild('timestamp').limitToLast(1).once('value');
    let lastMessage = '';
    let lastMessageAt = Date.now();
    if (snap.exists()) {
      const obj = snap.val();
      const m = Object.values(obj)[0];
      if (m.text) lastMessage = m.text;
      else if (m.image) lastMessage = m.isGif ? '🎬 GIF' : '📷 Photo';
      else if (m.video) lastMessage = '🎥 Video';
      else if (m.audio) lastMessage = '🎤 Voice message';
      lastMessageAt = m.timestamp;
    }
    await db.ref(`chats/${chatId}`).update({ lastMessage, lastMessageAt });
  } catch (err) {
    console.error(err);
    toast("Couldn't delete — try again");
  }
}

async function deleteChat(chatId) {
  const chat = state.chats.find(c => c.id === chatId);
  if (!chat) return;
  try {
    // Remove from every participant's chat list
    for (const u of chat.participants) {
      await db.ref(`userChats/${u}/${chatId}`).remove();
    }
    await db.ref(`messages/${chatId}`).remove();
    await db.ref(`chats/${chatId}`).remove();
  } catch (err) {
    console.error(err);
    toast("Couldn't delete chat — try again");
  }
}

async function leaveGroup(chatId) {
  const me = state.me.username;
  try {
    await db.ref(`userChats/${me}/${chatId}`).remove();
    await db.ref(`chats/${chatId}/participants/${me}`).remove();
    // Clean up if no one is left
    const snap = await db.ref(`chats/${chatId}/participants`).once('value');
    const remaining = snap.val() ? Object.keys(snap.val()) : [];
    if (remaining.length === 0) {
      await db.ref(`messages/${chatId}`).remove();
      await db.ref(`chats/${chatId}`).remove();
    }
  } catch (err) {
    console.error(err);
    toast("Couldn't leave group — try again");
  }
}

function showChatMenu(chatId, anchorEl) {
  // Close any existing menus first
  document.querySelectorAll('.chat-menu').forEach(m => m.remove());
  const chat = state.chats.find(c => c.id === chatId);
  if (!chat) return;
  const items = chat.type === 'direct'
    ? [{ label: '🗑️  Delete chat', action: 'delete', danger: true }]
    : [{ label: '🚪  Leave group', action: 'leave', danger: true }];
  const menu = document.createElement('div');
  menu.className = 'chat-menu';
  menu.innerHTML = items.map(it => `
    <div class="chat-menu-item ${it.danger ? 'danger' : ''}" data-action="${it.action}">${escapeHtml(it.label)}</div>
  `).join('');
  // Position near the anchor
  const rect = anchorEl.getBoundingClientRect();
  menu.style.top = `${Math.min(rect.bottom + 4, window.innerHeight - 80)}px`;
  menu.style.left = `${Math.max(8, rect.right - 180)}px`;
  document.body.appendChild(menu);

  const closer = (e) => {
    if (!menu.contains(e.target) && e.target !== anchorEl) {
      menu.remove();
      document.removeEventListener('click', closer);
    }
  };
  setTimeout(() => document.addEventListener('click', closer), 0);

  menu.addEventListener('click', async (e) => {
    const itemEl = e.target.closest('.chat-menu-item');
    if (!itemEl) return;
    const action = itemEl.dataset.action;
    menu.remove();
    document.removeEventListener('click', closer);
    if (action === 'delete') {
      const otherName = chat.participants.find(p => p !== state.me.username) || 'this friend';
      const ok = await confirmDialog({
        title: 'Delete chat?',
        message: `Delete the whole chat with ${otherName}? All messages disappear for both of you. This can't be undone!`,
        confirmText: 'Delete',
        cancelText: 'Keep it',
        danger: true,
      });
      if (ok) {
        await deleteChat(chatId);
        toast('Chat deleted');
      }
    } else if (action === 'leave') {
      const ok = await confirmDialog({
        title: 'Leave group?',
        message: `Leave "${chat.name}"? You won't see new messages from this group.`,
        confirmText: 'Leave',
        cancelText: 'Stay',
        danger: true,
      });
      if (ok) {
        await leaveGroup(chatId);
        toast('Left the group');
      }
    }
  });
}

// ============ MESSAGING ============
async function sendMessage(chatId, text, media = null, replyTo = null) {
  text = (text || '').trim();
  if (!text && !media) return;
  const ref = db.ref(`messages/${chatId}`).push();
  const msg = {
    id: ref.key,
    sender: state.me.username,
    senderAvatar: state.me.avatar,
    text: text,
    timestamp: Date.now(),
  };
  let previewText = text;
  if (media) {
    if (media.type === 'image' || media.type === 'gif') {
      msg.image = media.data;
      if (media.type === 'gif') msg.isGif = true;
      if (!previewText) previewText = media.type === 'gif' ? '🎬 GIF' : '📷 Photo';
    } else if (media.type === 'video') {
      msg.video = media.data;
      if (!previewText) previewText = '🎥 Video';
    } else if (media.type === 'audio') {
      msg.audio = media.data;
      if (!previewText) previewText = '🎤 Voice message';
    }
  }
  if (replyTo) msg.replyTo = replyTo;
  await ref.set(msg);
  await db.ref(`chats/${chatId}`).update({
    lastMessage: previewText,
    lastMessageAt: msg.timestamp,
  });
  // Send pop-up push notifications to everyone in the chat except me.
  // Fire-and-forget — if it fails, in-app sound + badge still work.
  const chat = state.chats.find(c => c.id === chatId);
  if (chat) {
    const chatName = chat.type === 'group' ? chat.name : state.me.username;
    const title = chat.type === 'group'
      ? `${state.me.username} in ${chat.name || 'group'}`
      : state.me.username;
    chat.participants.forEach(p => {
      if (p !== state.me.username) sendPushTo(p, title, previewText);
    });
  }
  return msg;
}

// ============ LIVE LISTENERS ============
function detachListeners() {
  if (listeners.chatList) { listeners.chatList.ref.off('value', listeners.chatList.fn); listeners.chatList = null; }
  if (listeners.messages) { listeners.messages.ref.off('value', listeners.messages.fn); listeners.messages = null; }
  detachAllMessageListeners();
  detachTypingListener();
  detachReadStateListener();
  detachCallListeners();
  if (activeCall) cleanupCall();
}

function attachChatListListener() {
  if (listeners.chatList) { listeners.chatList.ref.off('value', listeners.chatList.fn); }
  const ref = db.ref(`userChats/${state.me.username}`);
  const fn = async (snap) => {
    const ids = Object.keys(snap.val() || {});
    const chats = [];
    for (const id of ids) {
      const cs = await db.ref(`chats/${id}`).once('value');
      if (cs.exists()) {
        const c = cs.val();
        c.participants = Object.keys(c.participants || {});
        chats.push(c);
      }
    }
    chats.sort((a, b) => (b.lastMessageAt || b.createdAt) - (a.lastMessageAt || a.createdAt));
    state.chats = chats;
    await refreshUsersCache();
    // Attach message listeners for every chat so we can notify on new messages
    attachAllMessageListeners();
    // Attach call listeners for every direct chat — so incoming calls always ring
    attachCallListeners();
    // Listen for presence of every other person in our chats
    const friends = new Set();
    chats.forEach(c => c.participants.forEach(p => { if (p !== state.me.username) friends.add(p); }));
    friends.forEach(u => listenToPresence(u));
    // If current chat is no longer in our list, close it
    if (state.currentChatId && !chats.find(c => c.id === state.currentChatId)) {
      closeCurrentChat();
      renderMain();
      return;
    }
    renderChatList();
  };
  ref.on('value', fn);
  listeners.chatList = { ref, fn };
}

function attachMessagesListener(chatId) {
  if (listeners.messages) { listeners.messages.ref.off('value', listeners.messages.fn); }
  const ref = db.ref(`messages/${chatId}`);
  const fn = (snap) => {
    const obj = snap.val() || {};
    const msgs = Object.values(obj).sort((a, b) => a.timestamp - b.timestamp);
    state.messages = msgs;
    renderMessages();
    // If user is viewing this chat with the tab focused, mark as read
    if (state.currentChatId === chatId &&
        document.visibilityState === 'visible' &&
        document.hasFocus()) {
      markChatAsRead(chatId);
    }
  };
  ref.on('value', fn);
  listeners.messages = { ref, fn };
}

async function refreshUsersCache() {
  const usernames = new Set();
  for (const c of state.chats) {
    for (const p of c.participants) {
      if (p !== state.me.username) usernames.add(p);
    }
  }
  for (const u of usernames) {
    // Always refresh to pick up profile picture / avatar changes
    const snap = await db.ref(`users/${u}`).once('value');
    if (snap.exists()) {
      const v = snap.val();
      state.allUsers[u] = { username: v.username, avatar: v.avatar, photo: v.photo || null };
    } else if (!state.allUsers[u]) {
      state.allUsers[u] = { username: u, avatar: '👤' };
    }
  }
}

function formatTime(ts) {
  const d = new Date(ts);
  const h = d.getHours();
  const m = d.getMinutes().toString().padStart(2, '0');
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${m} ${ampm}`;
}

function renderChatList() {
  const list = document.getElementById('chatList');
  if (!list) return;
  if (state.chats.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="big">💬</div>
        <div class="title">No chats yet</div>
        <div class="sub">Tap the <strong>💬 button</strong> to start chatting. Make sure your friend has signed up too!</div>
      </div>
    `;
    return;
  }
  const filter = state.chatFilter || '';
  const visibleChats = filter
    ? state.chats.filter(c => chatDisplayName(c).toLowerCase().includes(filter))
    : state.chats;
  if (visibleChats.length === 0) {
    list.innerHTML = `
      <div class="empty-state">
        <div class="big">🔍</div>
        <div class="title">No chats found</div>
        <div class="sub">No chats match "${escapeHtml(filter)}"</div>
      </div>
    `;
    return;
  }
  list.innerHTML = visibleChats.map(c => {
    const isActive = c.id === state.currentChatId;
    const name = chatDisplayName(c);
    const avatar = chatDisplayAvatar(c);
    const preview = c.lastMessage || 'Say hi! 👋';
    const unread = state.unreadByChat[c.id] || 0;
    return `
      <div class="chat-item ${isActive ? 'active' : ''}" data-id="${c.id}">
        <div class="chat-avatar ${c.type}">${avatar}</div>
        <div class="chat-meta">
          <div class="chat-name">${escapeHtml(name)}</div>
          <div class="chat-preview">${escapeHtml(preview)}</div>
        </div>
        ${unread > 0 ? `<div class="unread-badge">${unread > 99 ? '99+' : unread}</div>` : ''}
        <button class="chat-menu-btn" data-menu-id="${c.id}" title="More options">⋮</button>
      </div>
    `;
  }).join('');
  list.querySelectorAll('.chat-item').forEach(el => {
    el.onclick = (e) => {
      // If they tapped the menu button, open the menu instead of the chat
      const menuBtn = e.target.closest('.chat-menu-btn');
      if (menuBtn) {
        e.stopPropagation();
        showChatMenu(menuBtn.dataset.menuId, menuBtn);
        return;
      }
      openChat(el.dataset.id);
    };
  });
}

async function openChat(chatId) {
  state.currentChatId = chatId;
  state.messages = [];
  // Reset unread count for this chat
  if (state.unreadByChat[chatId]) {
    state.unreadByChat[chatId] = 0;
    saveUnreadCounts();
  }
  // Mark as read (for read receipts)
  markChatAsRead(chatId);
  renderMain();
  renderChatList();
  attachMessagesListener(chatId);
  attachTypingListener(chatId);
  attachReadStateListener(chatId);
}

function renderChatArea() {
  const area = document.getElementById('chatArea');
  if (!state.currentChatId) {
    area.innerHTML = `
      <div class="chat-area-empty">
        <div class="big-emoji">🌍</div>
        <div class="head">Welcome, ${escapeHtml(state.me.username)}!</div>
        <div class="sub">Pick a chat on the left, or add a friend to start chatting. Have fun! 🌟</div>
      </div>
    `;
    return;
  }
  const chat = state.chats.find(c => c.id === state.currentChatId);
  if (!chat) {
    area.innerHTML = `<div class="chat-area-empty"><div class="big-emoji">⏳</div><div class="head">Loading...</div></div>`;
    return;
  }
  const subInfo = getChatSubtitle(chat);
  area.innerHTML = `
    <div class="chat-head">
      <button class="icon-btn back-btn" id="backBtn">←</button>
      <div class="chat-avatar ${chat.type}">${chatDisplayAvatar(chat)}</div>
      <div class="chat-head-info">
        <div class="chat-head-name">${escapeHtml(chatDisplayName(chat))}</div>
        <div class="chat-head-sub">${escapeHtml(subInfo)}</div>
      </div>
      <button class="icon-btn" id="wallpaperBtn" title="Change wallpaper">🎨</button>
      ${chat.type === 'direct' ? `<button class="icon-btn call-btn" id="callBtn" title="Voice call">📞</button>` : ''}
      ${chat.type === 'group' ? `<button class="icon-btn" id="groupInfoBtn" title="Group info">👥</button>` : ''}
    </div>
    <div class="messages" id="messages"></div>
    <div class="reply-composing" id="replyComposing" style="display:none">
      <div class="reply-quote in-composer">
        <div class="reply-sender" id="replySender"></div>
        <div class="reply-preview" id="replyPreview"></div>
      </div>
      <button class="cancel-img" id="cancelReply" title="Cancel reply">✕</button>
    </div>
    <div class="image-preview" id="imagePreview" style="display:none">
      <div id="previewSlot"></div>
      <div class="preview-info" id="previewInfo">Ready to send</div>
      <button class="cancel-img" id="cancelImg" title="Cancel">✕</button>
    </div>
    <div class="composer">
      <input type="file" id="imageFile" accept="image/*,video/*" style="display:none" />
      <button class="image-btn-composer" id="plusBtn" title="Send something" style="font-size:28px;">+</button>
      <button class="voice-btn" id="voiceBtn" title="Record a voice message">🎤</button>
      <input class="composer-input" id="composer" placeholder="Type a message... 💭" maxlength="500" autocomplete="off" />
      <button class="send-btn" id="sendBtn" title="Send">➤</button>
    </div>
  `;
  const backBtn = document.getElementById('backBtn');
  if (backBtn) backBtn.onclick = () => {
    if (listeners.messages) { listeners.messages.ref.off('value', listeners.messages.fn); listeners.messages = null; }
    clearImTyping();
    detachTypingListener();
    detachReadStateListener();
    state.currentChatId = null;
    renderMain();
    renderChatList();
  };
  // Apply saved wallpaper for this chat
  applyChatAreaWallpaper(state.currentChatId);
  // Wallpaper button
  const wpBtn = document.getElementById('wallpaperBtn');
  if (wpBtn) wpBtn.onclick = showWallpaperPicker;
  // Group info button (only present in group chats)
  const giBtn = document.getElementById('groupInfoBtn');
  if (giBtn) giBtn.onclick = () => showGroupInfo(state.currentChatId);
  // Voice call button (only present in direct chats)
  const callBtn = document.getElementById('callBtn');
  if (callBtn) callBtn.onclick = startVoiceCall;
  const composer = document.getElementById('composer');
  const sendBtn = document.getElementById('sendBtn');
  const plusBtn = document.getElementById('plusBtn');
  const voiceBtn = document.getElementById('voiceBtn');
  const imageFile = document.getElementById('imageFile');
  const imagePreview = document.getElementById('imagePreview');
  const previewSlot = document.getElementById('previewSlot');
  const previewInfo = document.getElementById('previewInfo');
  const cancelImg = document.getElementById('cancelImg');
  const replyComposing = document.getElementById('replyComposing');
  const replySender = document.getElementById('replySender');
  const replyPreview = document.getElementById('replyPreview');
  const cancelReply = document.getElementById('cancelReply');
  // Alias for code below that still refers to imageBtn
  const imageBtn = plusBtn;
  let pendingMedia = null;
  let pendingReply = null; // { messageId, sender, preview }
  let mediaRecorder = null;
  let audioChunks = [];
  let recTimer = null;
  let recStartMs = 0;
  let recStream = null;

  function clearPending() {
    pendingMedia = null;
    imagePreview.style.display = 'none';
    previewSlot.innerHTML = '';
  }

  function clearReply() {
    pendingReply = null;
    replyComposing.style.display = 'none';
  }

  function setReplyTo(msg) {
    pendingReply = {
      messageId: msg.id,
      sender: msg.sender,
      preview: getMsgPreview(msg) || '...',
    };
    replySender.textContent = `↩ Replying to ${msg.sender}`;
    replyPreview.textContent = pendingReply.preview;
    replyComposing.style.display = 'flex';
    composer.focus();
  }

  // Expose to renderMessages
  window.__chatPalsSetReply = setReplyTo;

  cancelReply.onclick = clearReply;

  function showPreview(media) {
    pendingMedia = media;
    previewSlot.innerHTML = '';
    let label = 'Ready to send';
    if (media.type === 'image') {
      const img = document.createElement('img');
      img.src = media.data;
      previewSlot.appendChild(img);
      label = '📷 Photo ready';
    } else if (media.type === 'gif') {
      const img = document.createElement('img');
      img.src = media.data;
      previewSlot.appendChild(img);
      label = '🎬 GIF ready';
    } else if (media.type === 'video') {
      const v = document.createElement('video');
      v.src = media.data;
      v.muted = true;
      v.loop = true;
      v.autoplay = true;
      v.playsInline = true;
      previewSlot.appendChild(v);
      label = '🎥 Video ready';
    } else if (media.type === 'audio') {
      const a = document.createElement('audio');
      a.src = media.data;
      a.controls = true;
      previewSlot.appendChild(a);
      label = '🎤 Voice message';
    }
    previewInfo.textContent = label;
    imagePreview.style.display = 'flex';
  }

  plusBtn.onclick = (e) => {
    e.stopPropagation();
    showPlusMenu(plusBtn);
  };

  imageFile.onchange = async (e) => {
    const file = e.target.files[0];
    imageFile.value = '';
    if (!file) return;
    imageBtn.disabled = true;
    imageBtn.textContent = '⏳';
    try {
      let media;
      if (file.type === 'image/gif') {
        const dataUrl = await readFileAsDataURL(file);
        media = { type: 'gif', data: dataUrl };
      } else if (file.type.startsWith('image/')) {
        const compressed = await compressImage(file);
        media = { type: 'image', data: compressed };
      } else if (file.type.startsWith('video/')) {
        const dataUrl = await readFileAsDataURL(file);
        media = { type: 'video', data: dataUrl };
      } else {
        toast("Pick a picture, GIF, or video!");
        imageBtn.disabled = false; imageBtn.textContent = '+';
        return;
      }
      const check = checkMediaSize(media.data, media.type);
      if (check.error) {
        toast(check.error);
        imageBtn.disabled = false; imageBtn.textContent = '+';
        return;
      }
      showPreview(media);
    } catch (err) {
      toast("Couldn't read that file, try another");
      console.error(err);
    }
    imageBtn.disabled = false;
    imageBtn.textContent = '+';
  };

  cancelImg.onclick = clearPending;

  // ---------- Voice recording ----------
  function stopRecordingUI() {
    voiceBtn.classList.remove('recording');
    voiceBtn.textContent = '🎤';
    composer.classList.remove('recording-mode');
    composer.disabled = false;
    composer.placeholder = 'Type a message... 💭';
    if (recTimer) { clearInterval(recTimer); recTimer = null; }
  }

  async function startRecording() {
    if (!navigator.mediaDevices || !window.MediaRecorder) {
      toast("Your browser doesn't support voice recording.");
      return;
    }
    try {
      recStream = await navigator.mediaDevices.getUserMedia({ audio: true });
      let mimeType = '';
      const candidates = ['audio/webm;codecs=opus', 'audio/webm', 'audio/mp4', 'audio/ogg'];
      for (const c of candidates) {
        if (MediaRecorder.isTypeSupported(c)) { mimeType = c; break; }
      }
      mediaRecorder = mimeType
        ? new MediaRecorder(recStream, { mimeType, audioBitsPerSecond: 32000 })
        : new MediaRecorder(recStream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => { if (e.data.size > 0) audioChunks.push(e.data); };
      mediaRecorder.onstop = async () => {
        if (recStream) { recStream.getTracks().forEach(t => t.stop()); recStream = null; }
        if (audioChunks.length === 0) return;
        const blob = new Blob(audioChunks, { type: mediaRecorder.mimeType });
        try {
          const dataUrl = await new Promise((res, rej) => {
            const r = new FileReader();
            r.onload = () => res(r.result);
            r.onerror = () => rej(r.error);
            r.readAsDataURL(blob);
          });
          const check = checkMediaSize(dataUrl, 'audio');
          if (check.error) { toast(check.error); return; }
          showPreview({ type: 'audio', data: dataUrl });
        } catch (err) {
          toast("Recording failed");
          console.error(err);
        }
      };
      mediaRecorder.start();
      recStartMs = Date.now();
      voiceBtn.classList.add('recording');
      voiceBtn.textContent = '⏹';
      composer.classList.add('recording-mode');
      composer.disabled = true;
      composer.placeholder = '🔴 Recording... 0:00';
      recTimer = setInterval(() => {
        const sec = Math.floor((Date.now() - recStartMs) / 1000);
        const m = Math.floor(sec / 60);
        const s = (sec % 60).toString().padStart(2, '0');
        composer.placeholder = `🔴 Recording... ${m}:${s}`;
        if (sec >= 60) stopRecording(); // auto-stop at 60s
      }, 250);
    } catch (err) {
      console.error(err);
      if (err.name === 'NotAllowedError') toast("Microphone permission denied. Check your browser settings!");
      else if (err.name === 'NotFoundError') toast("No microphone found on this device.");
      else toast("Couldn't start recording");
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
    stopRecordingUI();
  }

  voiceBtn.onclick = () => {
    if (pendingMedia) { toast("Send or cancel the current attachment first"); return; }
    if (mediaRecorder && mediaRecorder.state === 'recording') stopRecording();
    else startRecording();
  };

  // ---------- Send ----------
  const doSend = async () => {
    // If recording, stop first
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      stopRecording();
      // wait a tick for the blob to be ready
      await new Promise(r => setTimeout(r, 200));
    }
    const text = composer.value;
    if (!text.trim() && !pendingMedia) return;
    composer.value = '';
    sendBtn.disabled = true;
    imageBtn.disabled = true;
    voiceBtn.disabled = true;
    const media = pendingMedia;
    const reply = pendingReply;
    clearPending();
    clearReply();
    try {
      await sendMessage(state.currentChatId, text, media, reply);
    } catch (err) {
      toast("Couldn't send — try again");
      console.error(err);
    }
    clearImTyping();
    sendBtn.disabled = false;
    imageBtn.disabled = false;
    voiceBtn.disabled = false;
    composer.focus();
  };

  sendBtn.onclick = doSend;
  composer.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); }
  });
  // Mark me as typing as the user types
  composer.addEventListener('input', () => {
    if (composer.value.length > 0) markImTyping();
    else clearImTyping();
  });
  // Restore draft text if we just auto-refreshed from an update
  try {
    const draft = sessionStorage.getItem('chatpals_draft_' + state.currentChatId);
    if (draft) {
      composer.value = draft;
      sessionStorage.removeItem('chatpals_draft_' + state.currentChatId);
    }
  } catch {}
  renderMessages();
  composer.focus();
}

function renderMessages() {
  const box = document.getElementById('messages');
  if (!box) return;
  if (state.messages.length === 0) {
    box.innerHTML = `
      <div class="empty-state" style="margin:auto">
        <div class="big">✨</div>
        <div class="title">No messages yet</div>
        <div class="sub">Be the first to say hi!</div>
      </div>
    `;
    return;
  }
  const chat = state.chats.find(c => c.id === state.currentChatId);
  const isGroup = chat && chat.type === 'group';
  let html = '';
  let lastDay = '';
  for (const m of state.messages) {
    const day = new Date(m.timestamp).toDateString();
    if (day !== lastDay) {
      html += `<div class="day-divider">— ${day === new Date().toDateString() ? 'Today' : day} —</div>`;
      lastDay = day;
    }
    const mine = m.sender === state.me.username;
    const senderUser = getUser(m.sender);
    const avatarHtml = senderUser
      ? avatarContent(senderUser)
      : (m.senderAvatar || '👤');
    const replyQuoteHtml = m.replyTo ? `
      <div class="reply-quote" data-target-id="${escapeHtml(m.replyTo.messageId)}">
        <div class="reply-sender">↩ ${escapeHtml(m.replyTo.sender)}</div>
        <div class="reply-preview">${escapeHtml(m.replyTo.preview || '')}</div>
      </div>
    ` : '';
    const hasSpecial = !!(m.game || m.poll || m.rps);
    // Big emoji: only when the message is JUST emoji text and no media/special content
    let bigEmojiClass = '';
    if (m.text && !m.image && !m.video && !m.audio && !hasSpecial && isEmojiOnly(m.text)) {
      const ec = countEmojis(m.text);
      if (ec <= 1) bigEmojiClass = ' msg-big-emoji';
      else if (ec <= 3) bigEmojiClass = ' msg-big-emoji-2x';
      else if (ec <= 6) bigEmojiClass = ' msg-big-emoji-3x';
    }
    const textHtml = m.text
      ? (bigEmojiClass
          ? `<div class="${bigEmojiClass.trim()}">${escapeHtml(m.text)}</div>`
          : `<div>${escapeHtml(m.text)}</div>`)
      : '';
    const currentChat = state.chats.find(c => c.id === state.currentChatId);
    const receiptHtml = currentChat ? getReceiptHtml(currentChat, m) : '';
    html += `
      <div class="msg-row ${mine ? 'mine' : ''} ${hasSpecial ? 'has-special' : ''}" data-msg-id="${m.id}">
        <div class="msg-avatar">${avatarHtml}</div>
        <div class="msg-bubble">
          ${!mine && isGroup ? `<div class="msg-sender">${escapeHtml(m.sender)}</div>` : ''}
          ${replyQuoteHtml}
          ${m.image ? `<img class="msg-image" src="${m.image}" alt="photo" data-msg-id="${m.id}" />` : ''}
          ${m.video ? `<video class="msg-video" src="${m.video}" controls preload="metadata" playsinline></video>` : ''}
          ${m.audio ? `<audio class="msg-audio" src="${m.audio}" controls preload="metadata"></audio>` : ''}
          ${m.game ? renderTicTacToe(m) : ''}
          ${m.rps ? renderRPS(m) : ''}
          ${m.poll ? renderPoll(m) : ''}
          ${textHtml}
          <div class="msg-time">${formatTime(m.timestamp)}${receiptHtml}</div>
          <button class="msg-reply-btn" data-reply-id="${m.id}" title="Reply">↩</button>
          ${mine ? `<button class="msg-delete-btn" data-msg-id="${m.id}" title="Delete message">×</button>` : ''}
        </div>
      </div>
    `;
  }
  box.innerHTML = html;
  // Wire up lightbox on images
  box.querySelectorAll('.msg-image').forEach(img => {
    img.onclick = () => showLightbox(img.src);
  });
  // Wire up reply quotes
  box.querySelectorAll('.reply-quote[data-target-id]').forEach(q => {
    q.onclick = (e) => {
      e.stopPropagation();
      scrollToMessage(q.dataset.targetId);
    };
  });
  // Wire up reply buttons
  box.querySelectorAll('.msg-reply-btn').forEach(btn => {
    btn.onclick = (e) => {
      e.stopPropagation();
      const id = btn.dataset.replyId;
      const m = state.messages.find(mm => mm.id === id);
      if (m && window.__chatPalsSetReply) window.__chatPalsSetReply(m);
    };
  });
  // Wire up delete buttons
  box.querySelectorAll('.msg-delete-btn').forEach(btn => {
    btn.onclick = async (e) => {
      e.stopPropagation();
      const ok = await confirmDialog({
        title: 'Delete message?',
        message: "This removes the message for everyone in the chat. Can't be undone!",
        confirmText: 'Delete',
        cancelText: 'Keep',
        danger: true,
      });
      if (ok) {
        await deleteMessage(state.currentChatId, btn.dataset.msgId);
      }
    };
  });
  // Wire up tic-tac-toe cells
  box.querySelectorAll('.game-cell').forEach(c => {
    c.onclick = async (e) => {
      e.stopPropagation();
      if (c.disabled) return;
      const idx = parseInt(c.dataset.cell, 10);
      const msgId = c.dataset.msgId;
      await tttMakeMove(state.currentChatId, msgId, idx);
    };
  });
  // Wire up "Play again" buttons
  box.querySelectorAll('.game-new-btn').forEach(b => {
    b.onclick = (e) => { e.stopPropagation(); startTicTacToe(); };
  });
  // Wire up poll options
  box.querySelectorAll('.poll-option').forEach(b => {
    b.onclick = async (e) => {
      e.stopPropagation();
      const idx = parseInt(b.dataset.pollIdx, 10);
      const msgId = b.dataset.msgId;
      await votePoll(state.currentChatId, msgId, idx);
    };
  });
  // Wire up rock-paper-scissors buttons
  box.querySelectorAll('.rps-btn').forEach(b => {
    b.onclick = async (e) => {
      e.stopPropagation();
      const choice = b.dataset.rpsChoice;
      const msgId = b.dataset.msgId;
      await rpsMakeMove(state.currentChatId, msgId, choice);
    };
  });
  box.querySelectorAll('.rps-new-btn').forEach(b => {
    b.onclick = (e) => { e.stopPropagation(); startRPS(); };
  });
  box.scrollTop = box.scrollHeight;
}

// ============ MODALS ============
function showAddFriend() {
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>Add a Friend ✨</h2>
      <p>Type your friend's exact username (they need to sign up first).</p>
      <label class="label">Their username</label>
      <input class="input" id="friendName" placeholder="e.g. coolkid42" autocomplete="off" autocapitalize="off" />
      <div id="addErr"></div>
      <div class="modal-row">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn" id="okBtn">Start Chat</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.onclick = (e) => { if (e.target === bg) bg.remove(); };
  document.getElementById('cancelBtn').onclick = () => bg.remove();
  const input = document.getElementById('friendName');
  input.focus();
  const ok = document.getElementById('okBtn');
  const go = async () => {
    const name = input.value.trim();
    if (!name) return;
    ok.disabled = true;
    const res = await createDirectChat(name);
    if (res.error) {
      document.getElementById('addErr').innerHTML = `<div class="error-note">${escapeHtml(res.error)}</div>`;
      ok.disabled = false;
      return;
    }
    bg.remove();
    if (res.existed) toast('Chat already exists — opening it!');
    else toast('Friend added! 🎉');
    setTimeout(() => openChat(res.chatId), 200);
  };
  ok.onclick = go;
  input.addEventListener('keydown', e => { if (e.key === 'Enter') go(); });
}

function showNewGroup() {
  const friends = new Set();
  for (const c of state.chats) {
    for (const p of c.participants) if (p !== state.me.username) friends.add(p);
  }
  const friendList = [...friends];
  const bg = document.createElement('div');
  bg.className = 'modal-bg';
  bg.innerHTML = `
    <div class="modal">
      <h2>Make a Group 🎉</h2>
      <p>Pick friends from your chats, or add more by username.</p>
      <label class="label">Group name</label>
      <input class="input" id="groupName" placeholder="e.g. Best Pals" maxlength="40" autocomplete="off" />
      <label class="label">Add friends</label>
      ${friendList.length === 0
        ? `<p style="text-align:center;padding:14px;color:var(--ink-soft);font-size:13px;">No friends yet — add one below.</p>`
        : `<div class="friend-checklist" id="friendList"></div>`
      }
      <label class="label">Or add by username</label>
      <input class="input" id="extraFriend" placeholder="anotherfriend" autocomplete="off" autocapitalize="off" />
      <div id="groupErr"></div>
      <div class="modal-row">
        <button class="btn btn-secondary" id="cancelBtn">Cancel</button>
        <button class="btn" id="okBtn">Create Group</button>
      </div>
    </div>
  `;
  document.body.appendChild(bg);
  bg.onclick = (e) => { if (e.target === bg) bg.remove(); };
  document.getElementById('cancelBtn').onclick = () => bg.remove();
  const selected = new Set();
  const flEl = document.getElementById('friendList');
  if (flEl) {
    flEl.innerHTML = friendList.map(f => `
      <div class="friend-check" data-name="${f}">
        <div class="friend-check-avatar">${(state.allUsers[f]||{}).avatar || '👤'}</div>
        <div style="flex:1;font-weight:500">${escapeHtml(f)}</div>
        <div class="check-mark">⬜</div>
      </div>
    `).join('');
    flEl.querySelectorAll('.friend-check').forEach(el => {
      el.onclick = () => {
        const name = el.dataset.name;
        if (selected.has(name)) { selected.delete(name); el.classList.remove('selected'); el.querySelector('.check-mark').textContent = '⬜'; }
        else { selected.add(name); el.classList.add('selected'); el.querySelector('.check-mark').textContent = '✅'; }
      };
    });
  }
  document.getElementById('groupName').focus();
  document.getElementById('okBtn').onclick = async () => {
    const name = document.getElementById('groupName').value.trim();
    const extra = document.getElementById('extraFriend').value.trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
    if (extra && extra !== state.me.username) selected.add(extra);
    if (!name) { document.getElementById('groupErr').innerHTML = `<div class="error-note">Please name your group!</div>`; return; }
    if (selected.size === 0) { document.getElementById('groupErr').innerHTML = `<div class="error-note">Pick at least one friend!</div>`; return; }
    const res = await createGroup(name, [...selected]);
    if (res.error) { document.getElementById('groupErr').innerHTML = `<div class="error-note">${escapeHtml(res.error)}</div>`; return; }
    bg.remove();
    toast('Group created! 🎉');
    setTimeout(() => openChat(res.chatId), 200);
  };
}

function toast(text) {
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = text;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2700);
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ============ START ============
(async function init() {
  loadSavedTheme();
  setupVisibilityHandlers();

  // Register service worker (enables notifications + auto-updates)
  if ('serviceWorker' in navigator) {
    // Remember if a SW already controls us — if yes, a controllerchange means
    // a new version took over and we should reload to pick up the update.
    const hadController = !!navigator.serviceWorker.controller;
    let isReloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!hadController || isReloading) return;
      isReloading = true;
      // Save any in-progress text so nothing's lost across the reload
      try {
        const composer = document.getElementById('composer');
        if (composer && composer.value && state.currentChatId) {
          sessionStorage.setItem('chatpals_draft_' + state.currentChatId, composer.value);
        }
      } catch {}
      window.location.reload();
    });
    // Listen for messages from the SW (e.g. notification tap → open chat)
    navigator.serviceWorker.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'open-chat' && event.data.chatId) {
        if (state.currentChatId !== event.data.chatId) {
          openChat(event.data.chatId);
        }
      }
    });
    try {
      const reg = await navigator.serviceWorker.register('sw.js', {
        scope: './',
        updateViaCache: 'none',
      });
      // Check for new version every minute while page is open
      setInterval(() => { reg.update().catch(() => {}); }, 60 * 1000);
      // Also when the tab comes back to focus
      window.addEventListener('focus', () => { reg.update().catch(() => {}); });
    } catch (e) {
      console.warn('Service worker registration failed:', e);
    }
  }

  if (!initFirebase()) {
    renderConfigError();
    return;
  }
  configured = true;
  const saved = loadSessionLocal();
  if (saved && saved.username) {
    // Verify the user still exists in DB
    try {
      const snap = await db.ref(`users/${saved.username}`).once('value');
      if (snap.exists()) {
        const u = snap.val();
        state.me = { username: saved.username, avatar: u.avatar, photo: u.photo || null };
        saveSessionLocal(state.me);
        loadUnreadCounts();
        startMyPresence();
        loginToOneSignal(state.me.username);
        renderMain();
        attachChatListListener();
        return;
      }
    } catch (e) { console.error(e); }
  }
  renderAuth('signin');
})();
</script>
